name: Dataflow deploy to cloud

on:
  push:
    branches:
      - main
env:
  PROJECT_ID: ${{ secrets.PROJECT_ID }}
  TOPIC_ID: ${{ secrets.TOPIC_ID }}
  REGION: ${{ secrets.REGION }}
  BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
  BQ_DATASET: ${{ secrets.BQ_DATASET }}
  BQ_TABLE: ${{ secrets.BQ_TABLE }}
  NETWORK: ${{ secrets.NETWORK }}
  SUBNETWORK: ${{ secrets.SUBNETWORK }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Configure Docker Auth
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Deploy Dataflow Flex Template
        run: |
          gcloud dataflow flex-template build gs://water-quality-dataflow-bucket-a26081e/templates/iot-pipeline-spec.json \
            --image-gcr-path "asia-southeast1-docker.pkg.dev/n8nproject-461516/my-repo/iot-dataflow:v1" \
            --sdk-language "PYTHON" \
            --flex-template-base-image "PYTHON3" \
            --metadata-file "metadata.json" \
            --py-path "." \
            --env "FLEX_TEMPLATE_PYTHON_PY_FILE=iot_water_quality_pipeline.py"
