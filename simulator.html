<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Telemetry Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #00f2fe;
            --primary-hover: #4facfe;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --error: #fc8181;
            --success: #68d391;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            background: -webkit-linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(45deg, var(--primary-hover), var(--primary));
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .response-area {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            font-size: 0.85rem;
            display: none;
            word-wrap: break-word;
        }

        .response-area.success {
            display: block;
            border-left: 4px solid var(--success);
        }

        .response-area.error {
            display: block;
            border-left: 4px solid var(--error);
        }

        /* Micro animation for loading state */
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 1s ease-in-out infinite;
            display: none;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>IoT Telemetry Sender</h1>
            <p>Mô phỏng dữ liệu gửi từ ESP32 lên FastAPI Broker</p>
        </div>

        <form id="telemetryForm">
            <div class="form-group">
                <label for="apiKey">X-API-KEY (Bảo mật)</label>
                <input type="password" id="apiKey" class="form-control" placeholder="Nhập API Key bí mật..." value="mat-khau-bi-mat-esp32" required>
            </div>

            <div class="form-group">
                <label for="stationId">Station ID (Mã Trạm)</label>
                <input type="text" id="stationId" class="form-control" placeholder="VD: STATION_01" value="STATION_01" required>
            </div>

            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label for="temperature">Nhiệt độ (°C)</label>
                    <input type="number" step="0.1" id="temperature" class="form-control" placeholder="VD: 25.5" value="28.5" required>
                </div>
                <div style="flex: 1;">
                    <label for="ph">Độ pH</label>
                    <input type="number" step="0.1" id="ph" class="form-control" placeholder="VD: 7.2" value="7.4" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Gửi Dữ Liệu <span class="loader" id="loader"></span>
            </button>
        </form>

        <div id="responseBox" class="response-area"></div>
    </div>

    <script>
        document.getElementById('telemetryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const responseBox = document.getElementById('responseBox');
            
            // Lấy dữ liệu từ form
            const apiKey = document.getElementById('apiKey').value;
            const payload = {
                station_id: document.getElementById('stationId').value,
                temperature_c: parseFloat(document.getElementById('temperature').value),
                PH: parseFloat(document.getElementById('ph').value)
            };

            // Trạng thái Loading
            btn.disabled = true;
            loader.style.display = 'inline-block';
            responseBox.className = 'response-area';
            responseBox.innerText = '';

            try {
                // Gọi API
                const response = await fetch('https://fastapi-iot-broker-899157291449.asia-southeast1.run.app/api/telemetry', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    responseBox.classList.add('success');
                    responseBox.innerHTML = `<strong>Thành công!</strong><br><br><pre style="white-space: pre-wrap; font-family: monospace; font-size: 11px;">${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    responseBox.classList.add('error');
                    responseBox.innerHTML = `<strong>Lỗi (${response.status}):</strong> ${data.detail || 'Có lỗi xảy ra khi gọi API.'}`;
                }
            } catch (error) {
                responseBox.classList.add('error');
                responseBox.innerHTML = `<strong>Lỗi kết nối:</strong> Không thể kết nối tới server. Hãy chắc chắn Server đang chạy và hỗ trợ CORS.`;
            } finally {
                // Tắt trạng thái Loading
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
